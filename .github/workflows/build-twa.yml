name: Build TWA Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android-twa/local.properties

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.p12

      - name: Build unsigned AAB
        working-directory: android-twa
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Sign AAB with jarsigner
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/release.p12 \
            -storetype PKCS12 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            android-twa/app/build/outputs/bundle/release/app-release.aab \
            ferhenga

      - name: Build unsigned APK
        working-directory: android-twa
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # Sign with apksigner
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks /tmp/release.p12 \
            --ks-type PKCS12 \
            --ks-pass "pass:${KEYSTORE_PASSWORD}" \
            --ks-key-alias ferhenga \
            --key-pass "pass:${KEYSTORE_PASSWORD}" \
            android-twa/app/build/outputs/apk/release/app-release-unsigned.apk || true

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ferhenga-matematike-aab
          path: android-twa/app/build/outputs/bundle/release/*.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ferhenga-matematike-apk
          path: android-twa/app/build/outputs/apk/release/*.apk
