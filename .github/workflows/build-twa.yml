name: Build TWA Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android-twa/local.properties

      - name: Build AAB
        working-directory: android-twa
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Build APK
        working-directory: android-twa
        run: ./gradlew assembleRelease --no-daemon

      - name: List outputs
        run: |
          find android-twa -name "*.aab" -o -name "*.apk" 2>/dev/null
          ls -la android-twa/app/build/outputs/bundle/release/ 2>/dev/null || true
          ls -la android-twa/app/build/outputs/apk/release/ 2>/dev/null || true

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ferhenga-matematike-aab
          path: android-twa/app/build/outputs/bundle/release/*.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ferhenga-matematike-apk
          path: android-twa/app/build/outputs/apk/release/*.apk
