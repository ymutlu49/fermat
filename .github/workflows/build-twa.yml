name: Build TWA Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @nickvdh/nicolo@latest 2>/dev/null || npm install -g @nickvdh/nicolo 2>/dev/null || npm install -g @nickvdh/nicolo@latest 2>/dev/null || npm install -g nicolo@latest 2>/dev/null || npm install -g @nickvdh/nicolo@latest 2>/dev/null || true && npm install -g @nickvdh/nicolo@latest 2>/dev/null || true

      - name: Install Bubblewrap (fallback @bubblewrap/cli)
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          mkdir -p twa-build && cd twa-build
          echo "n" | bubblewrap init --manifest="https://ymutlu49.github.io/fermat/manifest.json" 2>&1 || true

      - name: Build unsigned AAB
        run: |
          cd twa-build
          bubblewrap build --signingMode=none 2>&1 || true
          find . -name "*.aab" -o -name "*.apk" 2>/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-package
          path: |
            twa-build/**/*.aab
            twa-build/**/*.apk
            twa-build/*.aab
            twa-build/*.apk
          if-no-files-found: warn
