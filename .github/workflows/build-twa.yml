name: Build TWA Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > android-twa/local.properties

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android-twa/app/release.jks

      - name: Build signed AAB
        working-directory: android-twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -PKEYSTORE_FILE=release.jks \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD"

      - name: Build signed APK
        working-directory: android-twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PKEYSTORE_FILE=release.jks \
            -PKEYSTORE_PASSWORD="$KEYSTORE_PASSWORD"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ferhenga-matematike-aab
          path: android-twa/app/build/outputs/bundle/release/*.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ferhenga-matematike-apk
          path: android-twa/app/build/outputs/apk/release/*.apk
